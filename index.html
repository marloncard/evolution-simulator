      <script>
          //window.addEventListener('load', () => {
            setTimeout(function() {
              let slimeSlider = document.getElementById('slimeCount');
              let mutationSlider = document.getElementById('mutationRate');
              let treeSlider = document.getElementById('treeCount');
              let slimeOutput = document.getElementById('slimeOutput');
              let mutationOutput = document.getElementById('mutationOutput');
              let treeOutput = document.getElementById('treeOutput');

              if (!slimeSlider || !mutationSlider || !treeSlider) return;

              slimeOutput.innerHTML = slimeSlider.value;
              mutationOutput.innerHTML = mutationSlider.value;
              treeOutput.innerHTML = treeSlider.value;

              slimeSlider.oninput = () => {
                slimeOutput.innerHTML = slimeSlider.value;
              }
              mutationSlider.oninput = () => {
                mutationOutput.innerHTML = mutationSlider.value;
              }
              treeSlider.oninput = () => {
                treeOutput.innerHTML = treeSlider.value;
              }
            }, 2000)


          //})
          
          
      </script>

      <script>
        $("#myLink").on("click", ()=> {

          if (document.getElementById("chart") === null) {
            $("#result").load("assets/text/chart.html", function() {
                  $("#result2").load("assets/text/data.html");
                });
                $("header.jumbotron").hide();
          } else {
            $("header.jumbotron").show();
            let div = document.getElementById('result');
            let div2 = document.getElementById('result2');
            div.innerHTML = "";
            div2.innerHTML = "";
          }
        })

      </script>
